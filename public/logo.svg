    <!-- Antenna -->
    <line x1="19.5" y1="6" x2="19.5" y2="2" stroke="white" stroke-width="2"/>
    <circle cx="19.5" cy="2" r="1.5" fill="white"/>

    <!-- Headset (left) -->
    <path d="M8 12C6 12 4.5 13.5 4.5 15.5C4.5 17.5 6 19 8 19" stroke="white" stroke-width="1.5"/>

    <!-- Headset (right with mic) -->
